<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg">

	<defs>
		<!-- Background -->
		<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#07111F"/>
			<stop offset="50%" stop-color="#0B1D33"/>
			<stop offset="100%" stop-color="#040A14"/>
		</linearGradient>

		<!-- Glow -->
		<radialGradient id="glow" cx="50%" cy="45%" r="55%">
			<stop offset="0%" stop-color="#00E5FF" stop-opacity="0.18"/>
			<stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
		</radialGradient>

		<!-- Border -->
		<linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#00E5FF" stop-opacity="0.6"/>
			<stop offset="100%" stop-color="#7B61FF" stop-opacity="0.4"/>
		</linearGradient>
	</defs>

	<!-- Rounded Background -->
	<rect
		x="16"
		y="16"
		width="480"
		height="480"
		rx="96"
		fill="url(#bg)"/>

	<!-- Glow -->
	<circle
		cx="256"
		cy="220"
		r="170"
		fill="url(#glow)"/>

	<!-- Decorative Grid -->
	<g opacity="0.05" stroke="#4DDFFF" stroke-width="1">
		<path d="M64 128H448"/>
		<path d="M64 192H448"/>
		<path d="M64 256H448"/>
		<path d="M64 320H448"/>
		<path d="M64 384H448"/>

		<path d="M128 64V448"/>
		<path d="M192 64V448"/>
		<path d="M256 64V448"/>
		<path d="M320 64V448"/>
		<path d="M384 64V448"/>
	</g>

	<!-- Border -->
	<rect
		x="16"
		y="16"
		width="480"
		height="480"
		rx="96"
		fill="none"
		stroke="url(#border)"
		stroke-width="2"/>

	<!-- لوگوی خودت را اینجا قرار بده -->
	<!-- Paste Your Logo Here -->

</svg>